server:
  port: 8050
eureka:
  instance:
    hostname: localhost
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ms_demo_loans?useSSL=false&allowPublicKeyRetrieval=true
    username:
    password:
  jpa:
    hibernate:
      ddl-auto: create
    database: mysql
    database-platform: org.hibernate.dialect.MySQL8Dialect
  management:
    endpoints:
      web:
        exposure:
          include: "*"