server:
  port: 8090
eureka:
  instance:
    hostname: localhost
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ms_demo_accounts?useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: Password
  jpa:
    hibernate:
      ddl-auto: create
    database: mysql
    database-platform: org.hibernate.dialect.MySQL8Dialect
  management:
    endpoints:
      web:
        exposure:
          include: "*"
    info:
      env:
        enabled: true

account:
  name: MS Demo Account
  msg: Welcome to MS Demo Account
  build-version: "1.0.0"
  mail-details:
    host-name: "contact@account.com"
    port: 8090
    from: "contact@account.com"
    subject: "Contact Us"
  actives-branches:
    - "Mumbai"
    - "Paris"
    - "London"

# Circuit Breaker
resilience4j:
  circuitbreaker:
    instances:
      customerDetailsService:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50